<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styledinee — Offline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111827; color: #f9fafb;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
  }
  .card {
    text-align: center; max-width: 380px;
  }
  .logo {
    font-size: 2rem; font-weight: 800; letter-spacing: .15em;
    margin-bottom: 1.5rem;
  }
  .logo span { color: #C9A84C; }
  .icon { font-size: 3.5rem; margin-bottom: 1rem; }
  h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .5rem; }
  p  { font-size: .9rem; color: #9ca3af; line-height: 1.6; margin-bottom: 1.5rem; }
  button {
    padding: .65rem 1.5rem; border-radius: 8px;
    background: #C9A84C; color: #111827;
    font-size: .88rem; font-weight: 700;
    border: none; cursor: pointer; font-family: inherit;
  }
  button:hover { background: #b8943d; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">STYLED<span>INEE</span></div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection detected. Please check your network and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
